  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:multiply;\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\");}\n  .vignette{position:fixed;inset:0;pointer-events:none;z-index:55;\n    box-shadow:inset 0 -60px 120px rgba(20,22,24,.55), inset 0 40px 140px rgba(20,22,24,.45);}\n  .rain{position:fixed;inset:-20% 0;pointer-events:none;z-index:50;opacity:.10;\n    background-image:repeating-linear-gradient(75deg, rgba(255,255,255,.6) 0 1px, transparent 1px 9px);\n    background-size:auto;animation:rain 0.55s linear infinite;transition:opacity .8s ease;}\n  body.idle .rain{opacity:.26}\n  @keyframes rain{from{transform:translateY(-12%)}to{transform:translateY(12%)}}\n\n  /* far drifting fog bank (parallax 0.3x, set in JS) */\n  #fog{position:fixed;left:0;bottom:var(--ground-h);height:160px;width:140vw;z-index:1;pointer-events:none;\n    background:radial-gradient(60% 100% at 30% 100%, rgba(220,222,216,.5), transparent 70%),\n               radial-gradient(50% 100% at 70% 100%, rgba(210,212,206,.42), transparent 72%);\n    filter:blur(2px);}\n  #fog .drift{position:absolute;inset:0;animation:drift 26s ease-in-out infinite alternate;}\n  @keyframes drift{from{transform:translateX(-3%)}to{transform:translateX(3%)}}\n\n  /* ---------- the street ---------- */\n  #scene{position:fixed;inset:0;z-index:2;overflow:hidden}\n  #world{position:absolute;left:0;bottom:0;width:3360px;height:100%;\n    will-change:transform;transition:none;}\n  .ground{position:absolute;left:0;bottom:0;width:100%;height:var(--ground-h);\n    background:linear-gradient(#33373a, #23272a 70%, #1c1f21);\n    border-top:2px solid #14171a;}\n  .ground:before{content:\"\";position:absolute;inset:0;opacity:.5;\n    background-image:repeating-linear-gradient(86deg, rgba(0,0,0,.18) 0 2px, transparent 2px 26px);}\n  .weeds{position:absolute;left:0;bottom:calc(var(--ground-h) - 8px);width:100%;height:30px;opacity:.7;\n    background-image:repeating-linear-gradient(98deg, transparent 0 18px, var(--slate-2) 18px 19px, transparent 19px 30px);\n    -webkit-mask-image:linear-gradient(transparent, #000 80%);mask-image:linear-gradient(transparent, #000 80%);}\n\n  /* lamp — the one warm light, near the house */\n  .lamp{position:absolute;bottom:var(--ground-h);left:430px;z-index:3;\n    -webkit-box-reflect:below 2px linear-gradient(rgba(0,0,0,.22), transparent 68%)}\n  .lamp .pole{width:5px;height:150px;margin:0 auto;background:linear-gradient(#1c1f21,#0e1011);transform:rotate(1.5deg);transform-origin:bottom}\n  .lamp .head{width:34px;height:20px;margin:-4px auto 0;border-radius:40% 40% 10% 10%;background:#15171a;position:relative;transform:rotate(1.5deg)}\n  .lamp .bulb{position:absolute;left:50%;top:7px;width:10px;height:10px;border-radius:50%;transform:translateX(-50%);\n    background:var(--lamp);box-shadow:0 0 8px 3px var(--lamp),0 0 26px 12px var(--lamp-soft);\n    animation:flick 4.5s steps(40) infinite}\n  .lamp .pool{position:absolute;left:50%;bottom:-2px;width:240px;height:60px;transform:translateX(-46%);\n    background:radial-gradient(closest-side, var(--lamp-soft), transparent 75%);pointer-events:none}\n  @keyframes flick{0%,97%,100%{opacity:1}98%{opacity:.55}99%{opacity:.85}}\n\n  /* ---------- depth ---------- */\n  /* distant rooftops, parallaxing slower than the street */\n  #skyline{position:fixed;left:0;bottom:var(--ground-h);width:100%;height:120px;z-index:1;pointer-events:none;\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='480' height='120'><path d='M0 120 L0 70 L30 70 L30 50 L90 50 L90 80 L140 80 L140 40 L150 28 L160 40 L160 75 L220 75 L220 60 L260 60 L260 85 L320 85 L320 45 L350 45 L350 62 L410 62 L410 52 L450 52 L450 78 L480 78 L480 120 Z' fill='%234a4f52'/><\u002Fsvg>\");\n    background-repeat:repeat-x;background-position:0 100%;background-size:480px 120px;\n    opacity:.6;filter:blur(.8px);\n    -webkit-mask-image:linear-gradient(transparent,#000 65%);mask-image:linear-gradient(transparent,#000 65%);}\n\n  /* the goblin's shadow, thrown by the lamp */\n  #gshadow{position:absolute;width:58px;height:13px;margin-left:-29px;z-index:7;pointer-events:none;border-radius:50%;\n    bottom:calc(var(--ground-h) - 8px);transform-origin:center center;opacity:0;transition:opacity .25s;\n    background:radial-gradient(closest-side, rgba(8,9,10,.62), transparent 76%)}\n\n  /* crows on the ridgelines */\n  .crow{position:absolute;z-index:4;pointer-events:none;transform-origin:center bottom;will-change:transform}\n  .crow svg{display:block;overflow:visible}\n  body:not(.reduce) .crow .cw{animation:perch 3s ease-in-out infinite;transform-origin:center}\n  @keyframes perch{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}\n  .crow.fly{opacity:0;transition:opacity .5s}\n  body:not(.reduce) .crow.fly{opacity:1;transition:none;animation:crow-fly 1.25s ease-in forwards}\n  @keyframes crow-fly{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(var(--fx,120px),-230px) rotate(var(--fr,30deg));opacity:0}}\n  body:not(.reduce) .crow.fly .cw{animation:flap .12s linear infinite;transform-origin:center}\n  @keyframes flap{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.35)}}\n\n  /* ---------- footprints ---------- */\n  .fprint{position:absolute;z-index:6;width:11px;height:5px;border-radius:50%;pointer-events:none;\n    background:radial-gradient(closest-side, rgba(8,10,12,.5), transparent 78%);opacity:.5;transition:opacity 3s linear;}\n\n  /* ---------- moth + the black parade ---------- */\n  .moth{position:absolute;z-index:9;width:14px;height:12px;cursor:pointer;will-change:transform;\n    filter:drop-shadow(0 0 2px rgba(226,148,56,.45))}\n  .moth svg{display:block;overflow:visible;pointer-events:none}\n  body:not(.reduce) .moth .mw{animation:moth-flap .08s linear infinite;transform-origin:7px 6px}\n  @keyframes moth-flap{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.4)}}\n  #parade{position:fixed;left:0;bottom:calc(var(--ground-h) - 12px);z-index:9;pointer-events:none;\n    display:flex;align-items:flex-end;gap:22px;transform:translateX(110vw);opacity:.94}\n  body.parading #parade{animation:march-across 15s linear forwards}\n  @keyframes march-across{from{transform:translateX(110vw)}to{transform:translateX(-45vw)}}\n  .parader{position:relative}\n  body:not(.reduce) .parader .pbob{animation:pbob .5s ease-in-out infinite}\n  @keyframes pbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}\n\n  /* ---------- the edge of the world ---------- */\n  .edge{position:absolute;left:3000px;bottom:0;width:380px;height:calc(var(--ground-h) + 40px);z-index:5;pointer-events:none;\n    background:linear-gradient(90deg, transparent, #050506 68%);}\n  .eyes{position:absolute;z-index:6;bottom:138px;pointer-events:none;opacity:0;white-space:nowrap}\n  .eyes span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#e9e4d6;margin:0 6px;\n    box-shadow:0 0 6px 1px rgba(233,228,214,.6)}\n  body:not(.reduce) .eyes span{animation:blink 5s steps(1) infinite}\n  @keyframes blink{0%,46%,52%,100%{opacity:1}48%,50%{opacity:0}}\n  #void{position:fixed;inset:0;z-index:45;background:#050506;opacity:0;pointer-events:none;transition:opacity 1s ease}\n  body.falling #void{opacity:1}\n  #fall-msg{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:46;opacity:0;\n    font-family:\"Special Elite\";font-size:15px;color:#cfcabd;letter-spacing:1px;text-align:center;line-height:1.7;\n    transition:opacity .6s;pointer-events:none}\n  body.falling #fall-msg{opacity:1}\n  body:not(.reduce) #goblin.fall{animation:goblin-fall 1.1s ease-in forwards}\n  @keyframes goblin-fall{0%{transform:translateX(-50%) translateY(0) rotate(0);opacity:1}\n    100%{transform:translateX(-50%) translateY(280px) rotate(46deg);opacity:0}}\n\n  /* ---------- diving into a building ---------- */\n  #scene{transition:transform .42s cubic-bezier(.4,0,.5,1), opacity .42s ease}\n  body.diving #scene{transform:scale(1.7);opacity:0;transform-origin:var(--dive-x,50%) 64%}\n\n  /* ---------- headbang at the radio tower ---------- */\n  body:not(.reduce) #goblin.headbang .bob{animation:headbang .25s ease-in-out infinite}\n  @keyframes headbang{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(3px) rotate(8deg)}}\n\n  /* ---------- 3 a.m. ---------- */\n  body.threeam{filter:saturate(.72) brightness(.82)}\n  body.threeam .rain{opacity:.3}\n  body.threeam.idle .rain{opacity:.44}\n  body.threeam #fog{filter:blur(2px);opacity:1}\n  body.threeam:not(.reduce) .lamp .bulb{animation:flick-3am 1.4s steps(20) infinite}\n  @keyframes flick-3am{0%,100%{opacity:1}10%{opacity:.18}12%{opacity:.9}40%{opacity:.5}42%{opacity:1}70%{opacity:.12}73%{opacity:.85}}\n  .toast{position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:43;pointer-events:none;\n    font-family:\"Special Elite\";font-size:12px;letter-spacing:1px;color:#cfcabd;background:rgba(20,22,24,.72);\n    padding:7px 14px;border-radius:3px;opacity:0;transition:opacity .8s;text-align:center;max-width:80vw}\n  .toast.show{opacity:1}\n\n  /* ---------- buildings (CSS/SVG stand-ins for hand-drawn art) ---------- */\n  .building{position:absolute;bottom:calc(var(--ground-h) - 6px);transform-origin:bottom center;\n    transform:translateX(-50%) rotate(var(--lean,0deg));}\n  .building .struct{filter:drop-shadow(0 10px 0 rgba(0,0,0,.18))}\n  .building svg{display:block;overflow:visible}\n  .building .stroke{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linejoin:round;stroke-linecap:round}\n  .building .fillwall{fill:#3a3e40}\n  .building .fillroof{fill:#1d2123}\n  .win{fill:#1a1d1f;transition:fill .25s ease}\n  .building.active .win,.building:hover .win{fill:var(--lamp);filter:url(#glow)}\n  .win.lit{fill:var(--lamp);filter:url(#glow)}\n\n  /* (0,0,0,.3), transparent 62%);}\n  #goblin .bob{transform-origin:bottom center;position:relative;transition:transform .45s cubic-bezier(.2,.8,.2,1)}\n  body:not(.reduce) #goblin.walking .bob{animation:bob .34s ease-in-out infinite}\n  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}\n  #goblin.left{transform:translateX(-50%) scaleX(-1)}\n  .leg{transform-origin:30px 70px}\n  body:not(.reduce) #goblin.walking .leg-f{animation:legF .34s ease-in-out infinite}\n  body:not(.reduce) #goblin.walking .leg-b{animation:legB .34s ease-in-out infinite}\n  @keyframes legF{0%,100%{transform:rotate(16deg)}50%{transform:rotate(-16deg)}}\n  @keyframes legB{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}\n  /* idle escalation: stand → sit → smoke → phone → sleep */\n  #goblin[data-idle=\"sit\"] .bob,#goblin[data-idle=\"smoke\"] .bob,#goblin[data-idle=\"phone\"] .bob{transform:translateY(15px)}\n  #goblin[data-idle=\"sleep\"] .bob{transform:translateY(17px) rotate(-3deg)}\n  #goblin[data-idle=\"sit\"] .leg-f,#goblin[data-idle=\"smoke\"] .leg-f,#goblin[data-idle=\"phone\"] .leg-f,#goblin[data-idle=\"sleep\"] .leg-f{animation:none!important;transform:rotate(80deg)}\n  #goblin[data-idle=\"sit\"] .leg-b,#goblin[data-idle=\"smoke\"] .leg-b,#goblin[data-idle=\"phone\"] .leg-b,#goblin[data-idle=\"sleep\"] .leg-b{animation:none!important;transform:rotate(62deg)}\n  body:not(.reduce) #goblin.startle .bob{animation:startle .42s ease}\n  @keyframes startle{0%{transform:translateY(15px)}45%{transform:translateY(-6px)}100%{transform:translateY(0)}}\n\n  /* cigarette ember + smoke */\n  .ember{position:absolute;left:24px;top:31px;width:4px;height:4px;border-radius:50%;background:var(--lamp);\n    box-shadow:0 0 6px 2px var(--lamp);opacity:0;transition:opacity .6s;z-index:2}\n  .smoke{position:absolute;left:24px;top:30px;width:6px;height:6px;border-radius:50%;opacity:0;pointer-events:none;\n    background:radial-gradient(closest-side, rgba(205,205,200,.5), transparent)}\n  #goblin[data-idle=\"smoke\"] .ember{opacity:.95}\n  body:not(.reduce) #goblin[data-idle=\"smoke\"] .smoke{animation:smoke 2.6s ease-out infinite}\n  @keyframes smoke{0%{transform:translate(0,0) scale(.5);opacity:0}22%{opacity:.45}100%{transform:translate(-7px,-28px) scale(2.4);opacity:0}}\n\n  /* phone + blue face glow (doomscrolling) */\n  .phone{position:absolute;left:29px;top:50px;width:15px;height:9px;border-radius:1.5px;background:#0a0c0f;\n    border:1px solid #000;transform:rotate(-14deg);opacity:0;transition:opacity .4s;z-index:2}\n  .phone:after{content:\"\";position:absolute;inset:1.5px;border-radius:1px;background:#5aa6ff}\n  .facelight{position:absolute;left:21px;top:8px;width:31px;height:27px;border-radius:50%;opacity:0;pointer-events:none;\n    background:radial-gradient(closest-side, rgba(90,166,255,.65), transparent 75%);mix-blend-mode:screen}\n  #goblin[data-idle=\"phone\"] .phone{opacity:1}\n  body:not(.reduce) #goblin[data-idle=\"phone\"] .facelight{opacity:.9;animation:scroll-glow 3s ease-in-out infinite}\n  @keyframes scroll-glow{0%,100%{opacity:.5}50%{opacity:.95}}\n\n  /* sleep */\n  .zzz{position:absolute;left:50px;top:-4px;font-family:\"Special Elite\";font-size:13px;color:#cfcabd;opacity:0;transition:opacity .6s;z-index:2}\n  #goblin[data-idle=\"sleep\"] .zzz{opacity:.8}\n  body:not(.reduce) #goblin[data-idle=\"sleep\"] .zzz{animation:zzz 3.4s ease-in-out infinite}\n  @keyframes zzz{0%{opacity:0;transform:translate(0,4px) scale(.8)}30%{opacity:.85}100%{opacity:0;transform:translate(7px,-13px) scale(1.25)}}\n\n  /* eye: tracks the cursor, closes when asleep */\n  .eye-amber{transition:transform .18s ease-out}\n  #goblin[data-idle=\"sleep\"] .eye-amber{opacity:0}\n  .eye-lid{opacity:0}\n  #goblin[data-idle=\"sleep\"] .eye-lid{opacity:1}\n\n  /* ---------- HUD ---------- */\n  #hud{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;\n    align-items:flex-start;padding:14px 16px;pointer-events:none}\n  #hud .title{pointer-events:auto}\n  #hud .title b{font-family:\"IM Fell English\";font-style:italic;font-size:26px;color:#e9e4d6;letter-spacing:.5px;\n    text-shadow:2px 2px 0 rgba(0,0,0,.4);display:block;line-height:1}\n  #hud .title small{font-family:\"Special Elite\";font-size:10px;color:#a9a499;letter-spacing:2px;text-transform:uppercase}\n  .toggles{display:flex;gap:8px;pointer-events:auto}\n  .tog{font-family:\"Special Elite\";font-size:11px;letter-spacing:1px;color:#cfcabd;background:rgba(20,22,24,.7);\n    border:1px solid #0e1011;padding:7px 11px;border-radius:2px;cursor:pointer;text-transform:uppercase}\n  .tog:hover,.tog[aria-pressed=\"true\"]{color:var(--lamp);border-color:var(--lamp)}\n  .tog:focus-visible{outline:2px solid var(--lamp);outline-offset:2px}\n\n  #hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:42;\n    font-family:\"Special Elite\";font-size:13px;color:#dcd7ca;background:rgba(20,22,24,.66);\n    padding:8px 16px;border-radius:3px;letter-spacing:1px;text-align:center;transition:opacity .6s;line-height:1.5}\n  #hint.gone{opacity:0;pointer-events:none}\n  #hint kbd{background:#cfcabd;color:#1a1d1f;border-radius:3px;padding:0 6px;font-family:\"Special Elite\";font-size:12px;margin:0 1px}\n\n  /* ---------- d-pad (touch) ---------- */\n  #dpad{position:fixed;bottom:16px;right:16px;z-index:42;display:none;gap:8px;align-items:center}\n  #dpad button{width:54px;height:54px;border-radius:50%;border:1.5px solid #0e1011;background:rgba(20,22,24,.78);\n    color:#e9e4d6;font-size:22px;font-family:\"Special Elite\";cursor:pointer;display:flex;align-items:center;justify-content:center}\n  #dpad .go{width:64px;height:64px;color:var(--lamp);border-color:var(--lamp);font-size:13px}\n  @media (pointer:coarse){#dpad{display:flex} #hint{bottom:84px}}\n\n  /* ---------- storybook page overlay ---------- */\n  #page{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:22px;\n    background:rgba(12,13,15,.55);backdrop-filter:blur(2px)}\n  #page.open{display:flex}\n  body:not(.reduce) #page.open .sheet{animation:rise .4s cubic-bezier(.2,.8,.2,1)}\n  @keyframes rise{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}\n  .sheet{position:relative;width:min(640px,100%);max-height:86vh;overflow:auto;background:var(--paper);\n    color:var(--paper-ink);padding:34px 36px 30px;border:1px solid var(--paper-edge);\n    box-shadow:0 30px 70px rgba(0,0,0,.5);\n    -webkit-mask-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600' preserveAspectRatio='none'><rect x='5' y='5' width='590' height='590' rx='3' filter='url(%23r)'/><filter id='r'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='3' seed='7'/><feDisplacementMap in='SourceGraphic' scale='9'/><\u002Ffilter><\u002Fsvg>\");\n    mask-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600' preserveAspectRatio='none'><rect x='5' y='5' width='590' height='590' rx='3' filter='url(%23r)'/><filter id='r'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='3' seed='7'/><feDisplacementMap in='SourceGraphic' scale='9'/><\u002Ffilter><\u002Fsvg>\");\n    -webkit-mask-size:100% 100%;mask-size:100% 100%;}\n  .sheet:before{content:\"\";position:absolute;inset:0;pointer-events:none;opacity:.5;\n    background:radial-gradient(120% 90% at 90% 0%, rgba(120,95,40,.10), transparent 40%),\n              radial-gradient(80% 70% at 6% 100%, rgba(80,60,30,.12), transparent 45%);}\n  .sheet h2{font-family:\"IM Fell English\";font-style:italic;font-weight:400;font-size:30px;margin:0 0 4px;line-height:1.05;\n    color:#211d16}\n  .sheet .eyebrow{font-family:\"Special Elite\";font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#7c6f53}\n  .sheet p{font-size:17px;line-height:1.6;margin:12px 0}\n  .sheet .lead{font-style:italic;color:#3b352a}\n  .sheet ul{list-style:none;padding:0;margin:14px 0}\n  .sheet li{padding:9px 0;border-bottom:1px dashed rgba(60,50,30,.35);font-size:16px;line-height:1.45}\n  .sheet li b{font-family:\"IM Fell English\";font-style:normal;font-size:18px}\n  .sheet li .note{display:block;color:#6a6049;font-size:14px;font-style:italic;margin-top:2px}\n  .sheet a{color:#7a3f10;text-decoration:none;border-bottom:1px solid rgba(122,63,16,.4)}\n  .sheet a:hover{color:#9c4d10;border-color:#9c4d10}\n  .redact{background:#1a1713;color:#1a1713;border-radius:1px;padding:0 3px;user-select:none;\n    box-shadow:1px 1px 0 rgba(0,0,0,.3)}\n  .stamp{display:inline-block;font-family:\"Special Elite\";font-size:12px;letter-spacing:1.5px;color:#8a2018;\n    border:2px solid #8a2018;padding:2px 8px;border-radius:2px;transform:rotate(-4deg);opacity:.78;margin:6px 6px 0 0}\n  .cage{margin-top:16px;padding:14px 16px;background:rgba(30,25,18,.07);border:1px dashed rgba(60,50,30,.4)}\n  .cage .eyebrow{color:#6a5d44}\n  .well-in{display:flex;gap:8px;margin-top:14px}\n  .well-in input{flex:1;background:rgba(255,255,255,.35);border:1px solid rgba(60,50,30,.4);\n    font-family:\"EB Garamond\";font-size:16px;padding:9px 11px;color:#211d16;border-radius:2px}\n  .well-in button{font-family:\"Special Elite\";font-size:12px;padding:0 14px;background:#211d16;color:var(--paper);border:0;border-radius:2px;cursor:pointer;letter-spacing:1px}\n  .well-out{margin-top:10px;font-family:\"Special Elite\";font-size:13px;color:#6a3a12;min-height:1.2em}\n  .close{position:absolute;top:12px;right:14px;font-family:\"Special Elite\";font-size:12px;letter-spacing:1px;\n    background:none;border:0;color:#6a5d44;cursor:pointer}\n  .close:hover{color:#211d16}\n  .backbar{margin-top:22px;font-family:\"Special Elite\";font-size:12px;letter-spacing:1px;color:#7c6f53}\n\n  /* ---------- menu mode ---------- */\n  body.menu #scene,body.menu #goblin,body.menu #fog,body.menu #hint,body.menu #dpad{display:none}\n  #menu{position:fixed;inset:0;z-index:30 \">The Workshop <small>things i've built<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"blog\" style=\"--r:-1deg\">The Notice Board <small>dispatches<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"music\" style=\"--r:1.5deg\">The Radio Tower <small>what's playing<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"movies\" style=\"--r:-1deg\">The Picture House <small>influences<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"contact\" style=\"--r:1deg\">The Post Office <small>contact<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"towns\" style=\"--r:-1.5deg\">The Crossroads <small>other towns<\u002Fsmall><\u002Fbutton>\n  <button class=\"m\" data-id=\"well\" style=\"--r:1deg\">The Well <small>127.0.0.1<\u002Fsmall><\u002Fbutton>\n<\u002Fnav>\n\n<!-- ================= HUD ================= -->\n<header id=\"hud\">\n  <div class=\"title\"><b>theelderemo.space<\u002Fb><small>pop. 1 · living in a constant merge conflict<\u002Fsmall><\u002Fdiv>\n  <div class=\"toggles\">\n    <button class=\"tog\" id=\"motionBtn\" aria-pressed=\"true\">Motion: on<\u002Fbutton>\n    <button class=\"tog\" id=\"modeBtn\" aria-pressed=\"false\">Just the menu<\u002Fbutton>\n    <button class=\"tog\" id=\"soundBtn\" aria-pressed=\"false\">Sound: off<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div id=\"hint\">\n  <kbd>◄<\u002Fkbd> <kbd>►<\u002Fkbd> walk &nbsp;·&nbsp; <kbd>↑<\u002Fkbd>/<kbd>enter<\u002Fkbd> go in &nbsp;·&nbsp; <kbd>tab<\u002Fkbd> jump between places &nbsp;·&nbsp; or just click\n<\u002Fdiv>\n\n<div id=\"dpad\">\n  <button id=\"bLeft\" aria-label=\"Walk left\">◄<\u002Fbutton>\n  <button id=\"bGo\" class=\"go\" aria-label=\"Enter building\">ENTER<\u002Fbutton>\n  <button id=\"bRight\" aria-label=\"Walk right\">►<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- ================= STORYBOOK PAGE ================= -->\n<div id=\"page\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"pgTitle\">\n  <article class=\"sheet\" tabindex=\"-1\">\n    <button class=\"close\" id=\"pgClose\">close ✕ (esc)<\u002Fbutton>\n    <div class=\"eyebrow\" id=\"pgEyebrow\"><\u002Fdiv>\n    <h2 id=\"pgTitle\"><\u002Fh2>\n    <div id=\"pgBody\"><\u002Fdiv>\n    <div class=\"backbar\">↓ / esc — back to the street<\u002Fdiv>\n  <\u002Farticle>\n<\u002Fdiv>\n\n<!-- ================= CONTENT (real) ================= -->\n<div id=\"store\" hidden=\"\">\n\n  <section data-id=\"about\" data-eyebrow=\"the one with the light on\">\n    <p class=\"lead\">Chris. 30. Indiana. Aquarius, if that means anything to you.<\u002Fp>\n    <p>Army vet. Full-stack dev (ish). Cybersecurity student. Over-engineers everything.<\u002Fp>\n    <p>Most of what I ship is just stuff I needed and refused to pay someone else to half-solve for me. Some of it's for fun. Some is a proof of concept that got out of hand. A few exist for no reason I can fully defend. <em>All of it meant something at the time. All of it is my stubborn belief that DIY is still the only way out.<\u002Fem><\u002Fp>\n    <p>Before the code, there was <span class=\"redact\">████████████████<\u002Fspan>. He doesn't talk about it.<\u002Fp>\n    <p><span class=\"stamp\">[REDACTED] BY EXECUTIVE ORDER<\u002Fspan><span class=\"stamp\">SIPRnet alumni since ████<\u002Fspan><span class=\"stamp\">TOP SECRET<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <section data-id=\"built\" data-eyebrow=\"contraptions i built instead of sleeping\">\n    <ul>\n      <li><b>VRSA<\u002Fb> — the big machine humming in the corner. A music workstation: lyric writing, a browser DAW, and a cloud backend running nine model variants on H100 GPUs. Started as a tool to avoid processing my own feelings; now it has paying subscribers. <a href=\"https://vrsa.app\" target=\"_blank\" rel=\"noopener\">vrsa.app →<\u002Fa><\u002Fli>\n      <li><b>hawktui<\u002Fb> — a little hawk. A TUI download manager I spent 40 hours building as a meme. It actually slaps.<\u002Fli>\n      <li><b>eDEX-UI (patched)<\u002Fb> — a cracked thing I stitched back together. Forked an abandoned sci-fi terminal, patched the vuln nobody else would, cut a clean release.<\u002Fli>\n      <li><b>Colab notebooks<\u002Fb> — jars of fireflies. Ollama, Wan 2.2, HeartLib — stripped down to \"just work\" with zero local setup.<\u002Fli>\n      <li><b>Datasets<\u002Fb> — heavy ledgers. 3.17M cleaned song lyrics, penetration-testing tradecraft, disassembled kernel functions paired with plain English.<\u002Fli>\n    <\u002Ful>\n    <div class=\"cage\">\n      <div class=\"eyebrow\">under a cloth in the corner<\u002Fdiv>\n      <p style=\"margin:6px 0 0\"><b style=\"font-family:'IM Fell English'\">tunesort<\u002Fb> A linux native music library sorter and player <em>Archived.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-id=\"blog\" data-eyebrow=\"nailed to the board\">\n    <ul>\n      <li><b>chmod 000 /impostor_syndrome<\u002Fb> <span class=\"note\">and other lies I tell myself<\u002Fspan><\u002Fli>\n      <li><b>Monthly AWS Bill: An Apology to my Bank Account<\u002Fb><\u002Fli>\n      <li><b>Training models to cry to Dashboard Confessional<\u002Fb><\u002Fli>\n      <li><b>hawktui: I spent 40 hours building a meme CLI<\u002Fb><\u002Fli>\n      <li><b>Stop paying for APIs. Build it yourself in your garage.<\u002Fb><\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section data-id=\"music\" data-eyebrow=\"what's coming out of the tower\">\n    <p class=\"lead\">One signal, no genre. The goblin headbangs alone.<\u002Fp>\n    <ul>\n      <li><b>Heavy<\u002Fb> <span class=\"note\">Lorna Shore · Chelsea Grin · AngelMaker · Whitechapel · Will Ramos<\u002Fspan><\u002Fli>\n      <li><b>Emo<\u002Fb> <span class=\"note\">Pierce the Veil · Gerard Way · $uicideboy$ · Jessie Murph<\u002Fspan><\u002Fli>\n      <li><b>Country<\u002Fb> <span class=\"note\">Morgan Wallen · Zach Bryan<\u002Fspan><\u002Fli>\n      <li><b>Old ghosts<\u002Fb> <span class=\"note\">Elvis · Bob Dylan · Frank Sinatra · The Doors<\u002Fspan><\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section data-id=\"movies\" data-eyebrow=\"tonight's double feature\">\n    <p>Donnie Darko · The Crow · Edward Scissorhands · The Nightmare Before Christmas · Silent Hill · Pan's Labyrinth · American Psycho · The Lost Boys<\u002Fp>\n    <p class=\"lead\">Projected by Burton, Craven &amp; Wan. BYO existential dread.<\u002Fp>\n  <\u002Fsection>\n\n  <section data-id=\"contact\" data-eyebrow=\"the merge-conflict desk\">\n    <p class=\"lead\">Tell me what features you want in my next project. I will likely ignore you and build something completely unnecessary instead.<\u002Fp>\n    <p><b style=\"font-family:'IM Fell English'\">Who I'd like to meet:<\u002Fb> devs who over-engineer simple problems. Anyone who can explain why my React components re-render 500 times a second. Also Gerard Way.<\u002Fp>\n    <p><span class=\"stamp\">RECEIVED<\u002Fspan><span class=\"stamp\">IGNORED<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <section data-id=\"towns\" data-eyebrow=\"roads out of town\">\n    <ul>\n      <li><b>theelderemo.dev<\u002Fb> <span class=\"note\">the real portfolio — the town where he wears a collar<\u002Fspan><\u002Fli>\n      <li><b>theelderemo.wtf<\u002Fb> <span class=\"note\">don't<\u002Fspan><\u002Fli>\n      <li><b>theelderemo.lol<\u002Fb> <span class=\"note\">worse<\u002Fspan><\u002Fli>\n      <li><b><a href=\"https://github.com/theelderemo\" target=\"_blank\" rel=\"noopener\">github.com/theelderemo →<\u002Fa><\u002Fb> <span class=\"note\">where the bodies are committed<\u002Fspan><\u002Fli>\n      <li><b>HackTheBox<\u002Fb> <span class=\"note\">pwning, allegedly<\u002Fspan><\u002Fli>\n      <li><b><a href=\"https://vrsa.app\" target=\"_blank\" rel=\"noopener\">vrsa.app →<\u002Fa><\u002Fb> <span class=\"note\">the big machine<\u002Fspan><\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section data-id=\"well\" data-eyebrow=\"make a wish. or don't.\">\n    <p>127001.666 friends and not one of them picked up.<\u002Fp>\n    <div class=\"well-in\">\n      <input id=\"wellInput\" type=\"text\" placeholder=\"echo into the well…\" aria-label=\"echo into the well\">\n      <button id=\"wellBtn\">echo<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"well-out\" id=\"wellOut\"><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<script>\n(function(){\n  \"use strict\";\n  var body=document.body, world=document.getElementById('world'), fog=document.getElementById('fog');\n  var goblin=document.getElementById('goblin')||makeGoblin();\n  var buildings=[].slice.call(document.querySelectorAll('.building'));\n  var hint=document.getElementById('hint');\n  var page=document.getElementById('page'), pgBody=document.getElementById('pgBody'),\n      pgTitle=document.getElementById('pgTitle'), pgEyebrow=document.getElementById('pgEyebrow');\n  var store=document.getElementById('store');\n  var WORLD_W=3360, SPEED=4.2, MINX=110, MAXX=WORLD_W-110;\n  var x=200, vx=0, facing=1, active=null, pageOpen=false, reduce=false, sound=false, lastInput=Date.now(), lastFocus=null;\n  var keys={left:false,right:false};\n  var actx=null;\n  var mx=window.innerWidth/2, my=window.innerHeight/2, camX=0, curStage='', eye=null;\n  var lastPrintX=x, printSide=false, radioGain=null, falling=false, visits=0, threeam=false, EDGE=3240,\n      scene=document.getElementById('scene'), eyesEl=null;\n\n  // build a goblin sprite and inject it into the world\n  function makeGoblin(){\n    var g=document.createElement('div'); g.id='goblin';\n    g.innerHTML=''+\n    '<span class=\"zzz\">z z<\u002Fspan>'+\n    '<div class=\"bob\"><svg width=\"72\" height=\"104\" viewBox=\"0 0 72 104\">'+\n      // back leg (camo)\n      '<g class=\"leg leg-b\"><rect x=\"26\" y=\"66\" width=\"11\" height=\"34\" rx=\"3\" fill=\"#3f4434\"/><rect x=\"26\" y=\"66\" width=\"11\" height=\"34\" rx=\"3\" fill=\"none\" stroke=\"#16181b\" stroke-width=\"2.4\"/><rect x=\"24\" y=\"98\" width=\"16\" height=\"7\" rx=\"2\" fill=\"#16181b\"/><\u002Fg>'+\n      // front leg (camo)\n      '<g class=\"leg leg-f\"><rect x=\"36\" y=\"66\" width=\"11\" height=\"34\" rx=\"3\" fill=\"#4a4f3d\"/><rect x=\"36\" y=\"66\" width=\"11\" height=\"34\" rx=\"3\" fill=\"none\" stroke=\"#16181b\" stroke-width=\"2.4\"/><rect x=\"34\" y=\"98\" width=\"16\" height=\"7\" rx=\"2\" fill=\"#16181b\"/><\u002Fg>'+\n      // hoodie body — soldier half (left, cooler) + emo half (right, warmer), faint seam\n      '<path d=\"M22 40 q14 -8 28 0 l3 30 q-17 7 -34 0 Z\" fill=\"#26282b\"/>'+\n      '<path d=\"M36 36 l3 4 l-1 30 q-9 3 -16 0 l3 -30 q5 -5 8 -4 Z\" fill=\"#2b2d31\"/>'+\n      '<path d=\"M22 40 q14 -8 28 0 l3 30 q-17 7 -34 0 Z\" fill=\"none\" stroke=\"#16181b\" stroke-width=\"2.6\" stroke-linejoin=\"round\"/>'+\n      '<line x1=\"36\" y1=\"38\" x2=\"37\" y2=\"70\" stroke=\"#16181b\" stroke-width=\"1.1\" stroke-dasharray=\"2 3\" opacity=\".7\"/>'+\n      // dog tags\n      '<path d=\"M34 40 l2 8\" stroke=\"#9a958a\" stroke-width=\"1.4\"/><rect x=\"34.5\" y=\"47\" width=\"4\" height=\"6\" rx=\"1\" fill=\"#9a958a\"/>'+\n      // arm + energy drink\n      '<rect x=\"47\" y=\"42\" width=\"7\" height=\"20\" rx=\"3\" fill=\"#26282b\" stroke=\"#16181b\" stroke-width=\"2.2\"/>'+\n      '<rect x=\"50\" y=\"40\" width=\"7\" height=\"11\" rx=\"1.5\" fill=\"#3a3e40\" stroke=\"#16181b\" stroke-width=\"1.8\"/><rect x=\"51\" y=\"42\" width=\"5\" height=\"3\" fill=\"var(--lamp)\"/>'+\n      // head\n      '<circle cx=\"36\" cy=\"24\" r=\"13\" fill=\"#cdbfae\"/><circle cx=\"36\" cy=\"24\" r=\"13\" fill=\"none\" stroke=\"#16181b\" stroke-width=\"2.6\"/>'+\n      // dark circle + one visible amber eye\n      '<ellipse cx=\"41\" cy=\"26\" rx=\"3.4\" ry=\"2.2\" fill=\"#9b8f86\" opacity=\".55\"/>'+\n      '<circle class=\"eye-amber\" cx=\"41\" cy=\"25\" r=\"1.7\" fill=\"var(--lamp)\"/>'+\n      '<line class=\"eye-lid\" x1=\"37.4\" y1=\"25\" x2=\"44.6\" y2=\"25\" stroke=\"#16181b\" stroke-width=\"2\" stroke-linecap=\"round\"/>'+\n      // side-swept emo fringe over the other eye\n      '<path d=\"M23 16 q14 -12 27 -3 q-3 9 -14 9 q-7 7 -16 4 q-2 -6 3 -10 Z\" fill=\"#1b1b1f\"/>'+\n      '<path d=\"M23 16 q14 -12 27 -3 q-3 9 -14 9 q-7 7 -16 4 q-2 -6 3 -10 Z\" fill=\"none\" stroke=\"#16181b\" stroke-width=\"2.2\" stroke-linejoin=\"round\"/>'+\n    '<\u002Fsvg><div class=\"ember\"><\u002Fdiv><div class=\"smoke\"><\u002Fdiv><div class=\"phone\"><\u002Fdiv><div class=\"facelight\"><\u002Fdiv><\u002Fdiv>';\n    document.getElementById('world').appendChild(g);\n    return g;\n  }\n\n  // reduced motion\n  try{ reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}\n  if(reduce) body.classList.add('reduce');\n\n  // ---- 3 a.m. + visitor memory (the town knows you) ----\n  var qp=new URLSearchParams(location.search);\n  var hr = qp.get('hour')!=null ? +qp.get('hour') : new Date().getHours();\n  threeam = (hr===3);\n  if(threeam) body.classList.add('threeam');\n  var subEl=document.querySelector('#hud .title small');\n  try{ visits=(parseInt(localStorage.getItem('clw_visits'),10)||0)+1; localStorage.setItem('clw_visits', visits); }catch(e){}\n  (function(){\n    var msg;\n    if(visits<=1){ msg='first time wandering through? mind the wet paint.'; }\n    else if(visits<10){ if(!threeam) subEl.textContent='pop. 1 · you came back'; msg='back again. the lamp’s still on for you.'; }\n    else { if(!threeam) subEl.textContent='pop. 1 · you live here now, don’t you'; msg='visit #'+visits+'. you live here now, don’t you.'; }\n    if(threeam) subEl.textContent='pop. 1 · 3:00 a.m. and the merge still won’t resolve';\n    var t=document.createElement('div'); t.className='toast'; t.textContent=msg; body.appendChild(t);\n    setTimeout(function(){ t.classList.add('show'); }, 700);\n    setTimeout(function(){ t.classList.remove('show'); }, 6200);\n    setTimeout(function(){ if(t.parentNode) t.remove(); }, 7200);\n  })();\n\n  // ---- door-zone geometry ----\n  buildings.forEach(function(b){ b._cx=+b.getAttribute('data-cx'); b._w=+b.getAttribute('data-w'); });\n\n  // ---- idle world: out-of-sync building sway + windows that flick on/off ----\n  buildings.forEach(function(b){\n    var s=b.querySelector('.struct');\n    if(s){ s.style.animationDuration=(8+Math.random()*7).toFixed(1)+'s'; s.style.animationDelay=(-Math.random()*8).toFixed(1)+'s'; }\n  });\n  var allWins=[].slice.call(document.querySelectorAll('#world .win'));\n  (function flicker(){\n    if(!reduce){\n      var w=allWins[(Math.random()*allWins.length)|0];\n      if(w){ var bb=w.closest('.building'); if(!bb||!bb.classList.contains('active')){ w.classList.add('lit'); setTimeout(function(){w.classList.remove('lit');}, 1600+Math.random()*3600); } }\n    }\n    setTimeout(flicker, 2200+Math.random()*4200);\n  })();\n\n  // ---- depth: parallax skyline, lamp-cast shadow, crows on the ridgelines ----\n  var skyline=document.getElementById('skyline');\n  var gshadow=document.createElement('div'); gshadow.id='gshadow'; world.appendChild(gshadow);\n  var LAMPX=447;\n  var crowSpots=[{x:430,b:292},{x:600,b:258},{x:1000,b:270},{x:1715,b:274},{x:2140,b:262}];\n  var crows=crowSpots.map(function(sp){\n    var c=document.createElement('div'); c.className='crow'; c._x=sp.x; c._gone=false;\n    c.style.left=sp.x+'px'; c.style.bottom=sp.b+'px';\n    c.innerHTML=\"<svg width='20' height='14' viewBox='0 0 20 14'><g class='cw'><path d='M2 9 Q6 3 10 8 Q14 3 18 9' fill='none' stroke='#0c0d0f' stroke-width='2' stroke-linecap='round'/><\u002Fg><path d='M10 8 Q11 11 9 13 Q12 12 12 9' fill='#0c0d0f'/><circle cx='10' cy='8' r='2.4' fill='#0c0d0f'/><\u002Fsvg>\";\n    world.appendChild(c); return c;\n  });\n  function scatter(c){\n    if(c._gone) return; c._gone=true;\n    var dir=(c._x>=x)?1:-1;\n    c.style.setProperty('--fx',(dir*(120+Math.random()*120)).toFixed(0)+'px');\n    c.style.setProperty('--fr',(dir*35)+'deg');\n    c.classList.add('fly');\n    setTimeout(function(){ c.style.visibility='hidden'; }, 1300);\n    setTimeout(function respawn(){\n      if(Math.abs(x-c._x)>520){ c.classList.remove('fly'); c.style.visibility=''; c._gone=false; }\n      else setTimeout(respawn, 3000);\n    }, 10000+Math.random()*8000);\n  }\n\n  // ---- footprints: wet prints fade behind the goblin ----\n  function dropPrint(){\n    var f=document.createElement('div'); f.className='fprint';\n    f.style.left=(x+(printSide?6:-6))+'px';\n    f.style.bottom='calc(var(--ground-h) - 20px)';\n    printSide=!printSide; world.appendChild(f);\n    requestAnimationFrame(function(){ requestAnimationFrame(function(){ f.style.opacity='0'; }); });\n    setTimeout(function(){ if(f.parentNode) f.remove(); }, 3200);\n  }\n\n  // ---- the edge of the world: walk off into the void, fall, respawn ----\n  eyesEl=document.querySelector('.eyes');\n  function fallOff(){\n    if(falling)return; falling=true; keys.left=keys.right=false;\n    goblin.classList.add('fall'); body.classList.add('falling');\n    setTimeout(function(){\n      x=200; lastPrintX=x; lastInput=Date.now();\n      goblin.classList.remove('fall'); body.classList.remove('falling'); falling=false;\n    }, 2600);\n  }\n\n  // ---- moth circling the lamp ----\n  var moth=document.createElement('div'); moth.className='moth';\n  moth.innerHTML=\"<svg width='14' height='12' viewBox='0 0 14 12'><g class='mw'><ellipse cx='4' cy='6' rx='4' ry='5.5' fill='#2a2620'/><ellipse cx='10' cy='6' rx='4' ry='5.5' fill='#2a2620'/><\u002Fg><rect x='6.3' y='2.5' width='1.4' height='8' rx='.7' fill='#15140f'/><\u002Fsvg>\";\n  world.appendChild(moth);\n  var mothT=Math.random()*100;\n  (function mothLoop(){\n    mothT+=0.025;\n    var ox=Math.cos(mothT*1.7)*30 + Math.sin(mothT*0.9)*12;\n    var oy=Math.sin(mothT*2.3)*20 + Math.cos(mothT*1.3)*9;\n    moth.style.left=(440+ox)+'px'; moth.style.bottom=(266+oy)+'px';\n    requestAnimationFrame(mothLoop);\n  })();\n  moth.addEventListener('click', triggerParade);\n\n  // ---- the black parade (click the moth at the lamp) ----\n  function marcher(i){\n    var lantern=(i%3===0)?\"<line x1='3' y1='9' x2='3' y2='30' stroke='#0b0c0e' stroke-width='1.6'/><circle cx='3' cy='8' r='3' fill='#e29438'/><circle cx='3' cy='8' r='5' fill='#e29438' opacity='.25'/>\":\"\";\n    return \"<svg width='26' height='52' viewBox='0 0 26 52'>\"+lantern+\"<ellipse cx='15' cy='9' rx='5' ry='6' fill='#0b0c0e'/><path d='M9 15 q6 -3 12 0 l-1 21 h-10 Z' fill='#0b0c0e'/><rect x='10.5' y='35' width='3.4' height='15' fill='#0b0c0e'/><rect x='15' y='35' width='3.4' height='15' fill='#0b0c0e'/><\u002Fsvg>\";\n  }\n  var paradeEl=document.createElement('div'); paradeEl.id='parade';\n  var ph=''; for(var pi=0;pi<9;pi++){ ph+=\"<div class='parader'><div class='pbob' style='animation-delay:\"+(-(pi*0.13)).toFixed(2)+\"s'>\"+marcher(pi)+\"<\u002Fdiv><\u002Fdiv>\"; }\n  paradeEl.innerHTML=ph; body.appendChild(paradeEl);\n  function triggerParade(){\n    if(body.classList.contains('parading'))return;\n    body.classList.add('parading'); paradeDrum();\n    paradeEl.addEventListener('animationend', function h(){ body.classList.remove('parading'); paradeEl.removeEventListener('animationend',h); });\n  }\n  function paradeDrum(){\n    if(!sound||!actx)return; var n=0;\n    (function boom(){\n      if(n>=26 || !body.classList.contains('parading'))return;\n      var o=actx.createOscillator(), g=actx.createGain();\n      o.type='sine'; o.frequency.value=56;\n      g.gain.setValueAtTime(0.12, actx.currentTime);\n      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.3);\n      o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.32);\n      n++; setTimeout(boom, 500);\n    })();\n  }\n\n  // ---- radio tower: an eerie signal whose volume is set by distance in the loop ----\n  function ensureRadio(){\n    if(radioGain || !actx) return;\n    radioGain=actx.createGain(); radioGain.gain.value=0;\n    var lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=820;\n    radioGain.connect(lp).connect(actx.destination);\n    [110,164.81,220,329.63].forEach(function(f,i){\n      var o=actx.createOscillator(); o.type=i%2?'sine':'triangle'; o.frequency.value=f; o.detune.value=(i-1)*5;\n      var g=actx.createGain(); g.gain.value=i===0?0.5:0.2;\n      o.connect(g).connect(radioGain); o.start();\n    });\n    var lfo=actx.createOscillator(); lfo.frequency.value=0.2;\n    var lg=actx.createGain(); lg.gain.value=0.03;\n    lfo.connect(lg); lg.connect(radioGain.gain); lfo.start();\n  }\n\n  function nearestDoor(){\n    var best=null, bd=99999;\n    buildings.forEach(function(b){\n      var d=Math.abs(x-b._cx), reach=b._w/2+46;\n      if(d<reach && d<bd){bd=d;best=b;}\n    });\n    return best;\n  }\n\n  // ---- main loop ----\n  function frame(){\n    if(!pageOpen && !body.classList.contains('menu') && !falling){\n      vx = (keys.right?SPEED:0) - (keys.left?SPEED:0);\n      if(vx!==0){ x+=vx; if(x<MINX)x=MINX; if(x>MAXX)x=MAXX; facing=vx>0?1:-1; lastInput=Date.now(); maybeStep();\n        if(Math.abs(x-lastPrintX)>=24){ dropPrint(); lastPrintX=x; } }\n      goblin.classList.toggle('walking', vx!==0);\n      goblin.classList.toggle('left', facing<0);\n      goblin.style.left=x+'px';\n\n      // camera\n      var vw=window.innerWidth, cam=x - vw/2;\n      if(cam<0)cam=0; if(cam>WORLD_W-vw)cam=Math.max(0,WORLD_W-vw);\n      world.style.transform='translateX('+(-cam)+'px)';\n      fog.style.transform='translateX('+(-cam*0.3)+'px)';\n      camX=cam;\n      if(skyline) skyline.style.backgroundPositionX=(-cam*0.55)+'px';\n\n      // active building\n      var d=nearestDoor();\n      if(d!==active){ if(active)active.classList.remove('active'); active=d; if(active)active.classList.add('active'); }\n\n      // crows scatter as you approach\n      for(var ci=0;ci<crows.length;ci++){ if(!crows[ci]._gone && Math.abs(x-crows[ci]._x)<120) scatter(crows[ci]); }\n      // lamp-cast shadow stretches + swings as you pass the pole\n      var dxl=x-LAMPX, adxl=Math.abs(dxl), R=360;\n      if(adxl<R){ var prox=1-adxl/R, len=1+Math.min(adxl,300)/110, sdir=dxl>=0?1:-1;\n        gshadow.style.opacity=(0.12+prox*0.5).toFixed(2);\n        gshadow.style.transform='translateX('+(sdir*len*10).toFixed(0)+'px) scaleX('+len.toFixed(2)+') scaleY(.9)';\n      } else { gshadow.style.opacity='0'; }\n      gshadow.style.left=x+'px';\n\n      // the edge of the world: eyes fade in past the well, then you fall\n      if(eyesEl) eyesEl.style.opacity=Math.max(0,Math.min(1,(x-2950)/220));\n      if(x>=EDGE) fallOff();\n      // radio tower signal — louder the closer you stand\n      var dtTower=Math.abs(x-1360);\n      if(radioGain) radioGain.gain.value=Math.max(0,1-dtTower/700)*0.12;\n\n      // idle escalation: sit → smoke → phone → sleep\n      var st='';\n      if(vx===0){ var t=Date.now()-lastInput;\n        if(t>40000)st='sleep'; else if(t>20000)st='phone'; else if(t>10000)st='smoke'; else if(t>4000)st='sit'; }\n      setStage(st);\n      body.classList.toggle('idle', st!=='');\n      updateEye();\n      goblin.classList.toggle('headbang', dtTower<240 && curStage==='');\n    }\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // ---- goblin: idle escalation + cursor-eye tracking ----\n  window.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; });\n  function setStage(s){\n    if(s===curStage) return;\n    if(curStage!=='' && s===''){ goblin.classList.add('startle'); setTimeout(function(){goblin.classList.remove('startle');},420); }\n    curStage=s;\n    if(s) goblin.dataset.idle=s; else delete goblin.dataset.idle;\n  }\n  function updateEye(){\n    if(!eye){ eye=goblin.querySelector('.eye-amber'); if(!eye) return; }\n    if(curStage==='sleep'){ eye.style.transform=''; return; }\n    var headX=x-camX, headY=window.innerHeight-198;\n    var dx=mx-headX, dy=my-headY, dist=Math.hypot(dx,dy)||1, max=1.7;\n    eye.style.transform='translate('+((dx/dist)*max*facing).toFixed(2)+'px,'+((dy/dist)*max).toFixed(2)+'px)';\n  }\n\n  var stepGate=0;\n  function maybeStep(){\n    if(!sound) return;\n    var now=Date.now(); if(now-stepGate<150)return; stepGate=now;\n    try{\n      if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();\n      var o=actx.createOscillator(), g=actx.createGain();\n      o.type='triangle'; o.frequency.value=90+Math.random()*30;\n      g.gain.setValueAtTime(0.05, actx.currentTime);\n      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.07);\n      o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.08);\n    }catch(e){}\n  }\n\n  // ---- page open/close (with a dive-in transition) ----\n  function openPage(id){\n    var src=store.querySelector('[data-id=\"'+id+'\"]'); if(!src)return;\n    var b=buildings.filter(function(bx){return bx.getAttribute('data-id')===id;})[0];\n    var doDive = b && !reduce && !body.classList.contains('menu') && !pageOpen;\n    if(doDive){ scene.style.setProperty('--dive-x',(b._cx-camX)+'px'); body.classList.add('diving'); }\n    keys.left=keys.right=false; goblin.classList.remove('walking');\n    setTimeout(function(){ fillAndShow(src,b); }, doDive?360:0);\n  }\n  function fillAndShow(src,b){\n    pgTitle.textContent = b ? b.querySelector('.sign-btn').firstChild.textContent : src.getAttribute('data-id');\n    pgEyebrow.textContent = src.getAttribute('data-eyebrow')||'';\n    pgBody.innerHTML = src.innerHTML;\n    if(threeam && src.getAttribute('data-id')==='blog'){\n      var ul=pgBody.querySelector('ul');\n      if(ul){ var li=document.createElement('li');\n        li.innerHTML=\"<b>3:00 a.m. — you again?<\u002Fb> <span class='note'>the board wrote this one itself. i didn’t.<\u002Fspan>\";\n        li.style.color='#7a1f12'; ul.insertBefore(li, ul.firstChild); }\n    }\n    page.classList.add('open'); pageOpen=true;\n    lastFocus=document.activeElement;\n    page.querySelector('.sheet').focus();\n    wireWell();\n  }\n  function closePage(){\n    if(!pageOpen)return;\n    page.classList.remove('open'); pageOpen=false; body.classList.remove('diving'); lastInput=Date.now();\n    if(lastFocus && lastFocus.focus) lastFocus.focus();\n  }\n  document.getElementById('pgClose').addEventListener('click', closePage);\n  page.addEventListener('click', function(e){ if(e.target===page) closePage(); });\n\n  function wireWell(){\n    var inp=document.getElementById('wellInput'), btn=document.getElementById('wellBtn'), out=document.getElementById('wellOut');\n    if(!inp)return;\n    var mem=[]; try{ mem=JSON.parse(localStorage.getItem('clw_well')||'[]'); }catch(e){}\n    function echo(){\n      var v=inp.value.trim(), reply;\n      if(!v){\n        reply = (mem.length && Math.random()<0.6)\n          ? 'the well still has this one: “'+mem[(Math.random()*mem.length)|0]+'”'\n          : '→ connection refused.';\n      } else {\n        var past = mem.length ? mem[(Math.random()*mem.length)|0] : null;\n        mem.push(v); if(mem.length>40) mem.shift();\n        try{ localStorage.setItem('clw_well', JSON.stringify(mem)); }catch(e){}\n        reply = (past && Math.random()<0.5)\n          ? '“'+v+'” → the well echoes something you left before: “'+past+'”'\n          : '“'+v+'” → connection refused. (logged anyway.)';\n      }\n      out.textContent=reply; inp.value=''; inp.focus();\n    }\n    btn.addEventListener('click', echo);\n    inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){e.preventDefault();echo();} e.stopPropagation(); });\n  }\n\n  // ---- keyboard ----\n  window.addEventListener('keydown', function(e){\n    if(pageOpen){\n      if(e.key==='Escape'||e.key==='ArrowDown'){ e.preventDefault(); closePage(); }\n      return;\n    }\n    if(body.classList.contains('menu')) return;\n    switch(e.key){\n      case 'ArrowLeft': keys.left=true; e.preventDefault(); break;\n      case 'ArrowRight': keys.right=true; e.preventDefault(); break;\n      case 'ArrowUp': case 'Enter':\n        // only steal Enter when a building isn't focused (let Tab+Enter use the button)\n        if(active && document.activeElement.tagName!=='BUTTON'){ e.preventDefault(); openPage(active.getAttribute('data-id')); }\n        break;\n    }\n    hideHint();\n  });\n  window.addEventListener('keyup', function(e){\n    if(e.key==='ArrowLeft')keys.left=false;\n    if(e.key==='ArrowRight')keys.right=false;\n  });\n\n  // ---- click / tab on signs ----\n  document.querySelectorAll('.sign-btn').forEach(function(btn){\n    btn.addEventListener('click', function(){ openPage(btn.getAttribute('data-id')); });\n    btn.addEventListener('focus', function(){\n      // walking the camera to a tabbed building so it's visible\n      var b=btn.closest('.building'); if(b){ x=b._cx; lastInput=Date.now(); }\n    });\n  });\n  // clicking the building body too\n  buildings.forEach(function(b){ b.addEventListener('click', function(e){ if(e.target.closest('.sign-btn'))return; openPage(b.getAttribute('data-id')); }); });\n  document.querySelectorAll('#menu .m').forEach(function(btn){\n    btn.addEventListener('click', function(){ openPage(btn.getAttribute('data-id')); });\n  });\n\n  // ---- touch d-pad ----\n  function hold(el,k){\n    if(!el)return;\n    var set=function(v){return function(e){e.preventDefault(); keys[k]=v; lastInput=Date.now(); hideHint();};};\n    el.addEventListener('pointerdown', set(true));\n    el.addEventListener('pointerup', set(false));\n    el.addEventListener('pointerleave', set(false));\n    el.addEventListener('pointercancel', set(false));\n  }\n  hold(document.getElementById('bLeft'),'left');\n  hold(document.getElementById('bRight'),'right');\n  var go=document.getElementById('bGo');\n  if(go)go.addEventListener('click', function(){ if(active)openPage(active.getAttribute('data-id')); });\n\n  // ---- toggles ----\n  var modeBtn=document.getElementById('modeBtn');\n  modeBtn.addEventListener('click', function(){\n    var on=body.classList.toggle('menu');\n    modeBtn.setAttribute('aria-pressed', on);\n    modeBtn.textContent = on ? 'Explore on foot' : 'Just the menu';\n    if(on)closePage();\n  });\n  var soundBtn=document.getElementById('soundBtn');\n  soundBtn.addEventListener('click', function(){\n    sound=!sound; soundBtn.setAttribute('aria-pressed', sound);\n    soundBtn.textContent = 'Sound: '+(sound?'on':'off');\n    if(sound){ try{ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); ensureRadio(); }catch(e){} }\n  });\n\n  // ---- motion toggle (lets reduced-motion visitors opt back into the world) ----\n  var motionBtn=document.getElementById('motionBtn');\n  function setReduce(v){\n    reduce=v; body.classList.toggle('reduce', v);\n    motionBtn.setAttribute('aria-pressed', String(!v));\n    motionBtn.textContent = 'Motion: '+(v?'off':'on');\n  }\n  motionBtn.addEventListener('click', function(){ setReduce(!reduce); });\n  setReduce(reduce);\n\n  // ---- hint ----\n  var hinted=false;\n  function hideHint(){ if(hinted)return; hinted=true; hint.classList.add('gone'); }\n  setTimeout(hideHint, 9000);\n\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
