<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 185" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
      .bg { fill: #0d1117; }
      .text-terminal { font-family: 'Fira Code', monospace; font-size: 14px; fill: #8b949e; }
      .text-title { font-family: 'Fira Code', monospace; font-size: 36px; font-weight: 700; fill: #7a0040; animation: title-corrupt 6s step-end infinite; }
      .cursor { fill: #cc0033; animation: blink 1s step-end infinite; }
      
      @keyframes blink { 50% { opacity: 0; } }

      .line-1 { animation: type 6s step-end infinite; animation-delay: 0s; }
      .line-2 { animation: type 6s step-end infinite; animation-delay: 1s; }
      .line-3 { animation: type 6s step-end infinite; animation-delay: 0s; }
      .line-4 { animation: type 6s step-end infinite; animation-delay: 1s; }
      .line-5 { animation: type 6s step-end infinite; animation-delay: 2s; }
      .line-6 { animation: type 6s step-end infinite; animation-delay: 3s; }
      .final-block { animation: type-final 6s step-end infinite; animation-delay: 4.5s; opacity: 0; }

      @keyframes type { 0%, 100% { opacity: 0; } 1% { opacity: 1; } }
      @keyframes type-final { 0% { opacity: 0; } 1% { opacity: 1; } 100% { opacity: 1; } }

      @keyframes title-corrupt {
        0%, 74% { opacity: 0; }
        75%, 79% { opacity: 1; fill: #7a0040; transform: scaleX(1); }
        80%, 82% { opacity: 1; fill: #cc0033; transform: scaleX(-1); }
        83%, 100% { opacity: 1; fill: #7a0040; transform: scaleX(1); }
      }
    </style>
  </defs>
  
  <line x1="0" y1="183" x2="800" y2="183" stroke="#7a0040" stroke-width="4"/>

  <g transform="translate(20, 18)" class="text-terminal">
    <text y="0" class="line-1">$ cat .motd</text>
    <text y="22" class="line-2">"Bad configuration isn't a learning opportunity. It's an incident."</text>
    <text y="44" class="line-3">$ ls -R ./dust</text>
    <text y="66" class="line-4">./dust/dreams/</text>
    <text y="88" class="line-5">./dust/dreams/abandoned_code/</text>
    <text y="110" class="line-6">./dust/dreams/abandoned_code/exists.but.why?</text>
    
    <g transform="translate(0, 132)" class="final-block">
      <text y="0">bash: ./dust: Permission Denied. Error: void_overflow.</text>
      <rect x="0" y="8" width="10" height="15" class="cursor"/>
    </g>
  </g>

</svg>